<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complaint Submitted</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f7fb;
        }

        .success-container {
            max-width: 600px;
            margin: 80px auto;
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        .success-icon {
            font-size: 60px;
            color: #28a745;
        }

        .complaint-id {
            font-weight: 600;
            font-size: 20px;
            color: #333;
        }

        .info-text {
            color: #666;
            margin-top: 10px;
        }

        .timeline {
            display: flex;
            justify-content: space-between;
            margin: 30px 0;
        }

        .timeline div {
            text-align: center;
            flex: 1;
        }

        .timeline div::before {
            content: '';
            display: block;
            height: 8px;
            background: #ddd;
            margin: 10px 5px;
            border-radius: 10px;
        }

        .timeline .active::before {
            background: #28a745;
        }

        .btn-group-custom {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-custom {
            flex: 1;
            border-radius: 8px;
            padding: 10px;
        }

        .btn-track {
            background: #007bff;
            color: white;
        }

        .btn-new {
            background: #6c757d;
            color: white;
        }

        .btn-home {
            background: #28a745;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="success-container">

    <!-- Success Icon -->
    <div class="success-icon">✔</div>

    <!-- Title -->
    <h3 class="mt-3">Complaint Submitted Successfully</h3>

    <!-- Complaint ID -->
    <p class="mt-3">Your Complaint ID:</p>
    <div class="complaint-id">CMP-2026-001245</div>

    <!-- Info -->
    <p class="info-text">
        Our team will review your complaint shortly.<br>
        Expected response time: <strong>24–48 hours</strong>
    </p>

    <!-- Progress Timeline -->
    <div class="timeline">
        <div class="active">
            <small>Submitted</small>
        </div>
        <div>
            <small>Under Review</small>
        </div>
        <div>
            <small>Resolved</small>
        </div>
    </div>

    <!-- Buttons -->
    <div class="btn-group-custom">
        <a href="track_complaint.html" class="btn btn-custom btn-track">Track Complaint</a>
        <a href="index.html" class="btn btn-custom btn-new">New Complaint</a>
        <a href="/" class="btn btn-custom btn-home">Home</a>
    </div>

</div>

</body>
</html>
