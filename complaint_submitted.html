<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Complaint Submitted</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f5f7fb;
}

/* Card */
.success-box {
    max-width: 800px;
    margin: 60px auto;
    background: #fff;
    padding: 40px;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
}

.check-icon {
    font-size: 60px;
    color: #28a745;
}

.title {
    font-size: 28px;
    font-weight: 600;
    margin-top: 15px;
}

.complaint-id {
    font-size: 22px;
    font-weight: 600;
    margin: 10px 0;
}

.sub-text {
    color: #666;
}

/* Progress */
.progress-container {
    margin: 30px 0;
}

.progress-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.progress-line div {
    flex: 1;
    height: 6px;
    margin: 0 5px;
    border-radius: 10px;
    background: #ddd;
}

.progress-line .active {
    background: #28a745;
}

.progress-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 14px;
}

/* Buttons */
.btn-group-custom {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 15px;
}

.btn-custom {
    padding: 12px 25px;
    border-radius: 10px;
    border: none;
    font-weight: 500;
}

.btn-track { background: #0d6efd; color: #fff; }
.btn-new { background: #6c757d; color: #fff; }
.btn-home { background: #28a745; color: #fff; }

.btn-custom:hover { opacity: 0.9; }

/* 📱 MOBILE */
@media(max-width:768px){
    .success-box {
        margin: 0;
        min-height: 100vh;
        border-radius: 0;
        padding: 25px;
    }

    .btn-group-custom {
        flex-direction: column;
    }

    .btn-custom {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="success-box">

        <div class="check-icon">✔</div>

        <div class="title">Complaint Submitted Successfully</div>

        <div class="mt-3">Your Complaint ID:</div>
        <div class="complaint-id" id="complaintId">Loading...</div>

        <p class="sub-text">
            Our team will review your complaint shortly.<br>
            Expected response time: <b>24–48 hours</b>
        </p>

        <!-- Progress -->
        <div class="progress-container">
            <div class="progress-line">
                <div class="active"></div>
                <div></div>
                <div></div>
            </div>

            <div class="progress-labels">
                <span>Submitted</span>
                <span>Under Review</span>
                <span>Resolved</span>
            </div>
        </div>

        <!-- Buttons -->
        <div class="btn-group-custom">
            <button class="btn-custom btn-track" onclick="track()">Track Complaint</button>
            <button class="btn-custom btn-new" onclick="newComplaint()">New Complaint</button>
            <button class="btn-custom btn-home" onclick="home()">Home</button>
        </div>

    </div>
</div>

<script>
/* Generate Complaint ID (Demo) */
function generateID(){
    const year = new Date().getFullYear();
    const random = Math.floor(100000 + Math.random() * 900000);
    return `CMP-${year}-${random}`;
}

document.getElementById("complaintId").innerText = generateID();

/* Button Actions */
function track(){
    window.location.href = "track_complaint.html"; // change to your page
}

function newComplaint(){
    window.location.href = "index.html";
}

function home(){
    window.location.href = "/";
}
</script>

</body>
</html>
