<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Track Complaint</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f5f7fb;
}

.container-box {
    max-width: 900px;
    margin: 50px auto;
    background: #fff;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.title {
    text-align: center;
    font-size: 26px;
    font-weight: 600;
}

.back-btn {
    background: #28a745;
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
}

/* Search */
.search-bar {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.search-bar input {
    flex: 1;
}

/* Details Card */
.details-card {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
    display: none;
}

.details-card p {
    margin: 6px 0;
}

/* Progress */
.progress-wrapper {
    margin-top: 30px;
}

.progress-line {
    display: flex;
    gap: 10px;
}

.progress-line div {
    flex: 1;
    height: 8px;
    border-radius: 10px;
    background: #ddd;
}

.progress-line .active {
    background: #0d6efd;
}

.labels {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 14px;
}

/* 📱 MOBILE */
@media(max-width:768px){
    .container-box {
        margin: 0;
        border-radius: 0;
        min-height: 100vh;
    }

    .search-bar {
        flex-direction: column;
    }

    .search-bar button {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="container-box">

        <button class="back-btn mb-3" onclick="goHome()">← Home</button>

        <div class="title">Track Your Complaint</div>

        <!-- Search -->
        <div class="search-bar">
            <input type="text" id="cidInput" class="form-control"
                placeholder="Enter Complaint ID (e.g. CMP-2026-001245)">
            <button class="btn btn-primary" onclick="track()">Track</button>
        </div>

        <!-- Details -->
        <div class="details-card" id="detailsCard">
            <h5>Complaint Details</h5>

            <p><b>ID:</b> <span id="cid"></span></p>
            <p><b>Status:</b> <span id="status"></span></p>
            <p><b>Issue:</b> <span id="issue"></span></p>
            <p><b>Submitted On:</b> <span id="date"></span></p>
        </div>

        <!-- Progress -->
        <div class="progress-wrapper" id="progressBox" style="display:none;">
            <div class="progress-line">
                <div id="p1"></div>
                <div id="p2"></div>
                <div id="p3"></div>
            </div>

            <div class="labels">
                <span>Submitted</span>
                <span>Under Review</span>
                <span>Resolved</span>
            </div>
        </div>

    </div>
</div>

<script>
/* Demo Data */
const data = {
    "CMP-2026-001245": {
        status: "Under Review",
        issue: "Product not working",
        date: "17 Apr 2026",
        step: 2
    }
};

function track(){
    let id = document.getElementById("cidInput").value.trim();
    let res = data[id];

    if(!res){
        alert("Complaint not found");
        return;
    }

    // Show data
    document.getElementById("detailsCard").style.display = "block";
    document.getElementById("progressBox").style.display = "block";

    document.getElementById("cid").innerText = id;
    document.getElementById("status").innerText = res.status;
    document.getElementById("issue").innerText = res.issue;
    document.getElementById("date").innerText = res.date;

    // Reset progress
    document.getElementById("p1").classList.remove("active");
    document.getElementById("p2").classList.remove("active");
    document.getElementById("p3").classList.remove("active");

    // Apply progress
    if(res.step >= 1) document.getElementById("p1").classList.add("active");
    if(res.step >= 2) document.getElementById("p2").classList.add("active");
    if(res.step >= 3) document.getElementById("p3").classList.add("active");
}

function goHome(){
    window.location.href = "/";
}
</script>

</body>
</html>
