<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Track Complaint</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f7fb;
        }

        .track-container {
            max-width: 700px;
            margin: 60px auto;
            background: #fff;
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            position: relative;
        }

        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .status-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .status-title {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .timeline {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .timeline div {
            text-align: center;
            flex: 1;
        }

        .timeline div::before {
            content: '';
            display: block;
            height: 8px;
            background: #ddd;
            margin: 10px 5px;
            border-radius: 10px;
        }

        .timeline .active::before {
            background: #007bff;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<div class="track-container">

    <!-- Home Button (Left Side) -->
    <a href="/" class="btn btn-success home-btn">
        ← Home
    </a>

    <h3 class="text-center mb-4">Track Your Complaint</h3>

    <!-- Input -->
    <div class="input-group">
        <input type="text" id="complaintId" class="form-control" placeholder="Enter Complaint ID (e.g. CMP-2026-001245)">
        <button class="btn btn-primary" onclick="trackComplaint()">Track</button>
    </div>

    <!-- Result Section -->
    <div id="resultSection" class="hidden">

        <div class="status-box">
            <div class="status-title">Complaint Details</div>

            <p><strong>ID:</strong> <span id="showId"></span></p>
            <p><strong>Status:</strong> <span id="statusText"></span></p>
            <p><strong>Issue:</strong> Product not working</p>
            <p><strong>Submitted On:</strong> 17 Apr 2026</p>
        </div>

        <!-- Timeline -->
        <div class="timeline">
            <div id="step1">Submitted</div>
            <div id="step2">Under Review</div>
            <div id="step3">Resolved</div>
        </div>

    </div>

</div>

<script>
function trackComplaint() {
    let id = document.getElementById("complaintId").value;

    if (id === "") {
        alert("Please enter Complaint ID");
        return;
    }

    // SHOW RESULT (Demo logic)
    document.getElementById("resultSection").classList.remove("hidden");
    document.getElementById("showId").innerText = id;

    // Fake status logic (for UI demo)
    let status = "Under Review";

    document.getElementById("statusText").innerText = status;

    document.getElementById("step1").classList.add("active");
    document.getElementById("step2").classList.add("active");
}
</script>

</body>
</html>
