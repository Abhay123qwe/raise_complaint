<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raise a Complaint</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: #f5f7fb;
    }

    .container-box {
        max-width: 1100px;
        margin: 40px auto;
        background: #fff;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    h2 {
        font-weight: 600;
        margin-bottom: 25px;
    }

    .form-control, .form-select {
        border-radius: 10px;
        padding: 12px;
        border: 1px solid #e0e0e0;
        transition: 0.3s;
    }

    .form-control:focus, .form-select:focus {
        border-color: #ff3b3b;
        box-shadow: none;
    }

    textarea {
        resize: none;
    }

    .upload-box {
        border: 2px dashed #ddd;
        border-radius: 12px;
        padding: 25px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
        background: #fafafa;
    }

    .upload-box:hover {
        border-color: #ff3b3b;
        background: #fff5f5;
    }

    .submit-btn {
        background: linear-gradient(45deg, #ff3b3b, #ff0000);
        color: #fff;
        border: none;
        padding: 12px 30px;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 500;
        transition: 0.3s;
    }

    .submit-btn:hover {
        text-decoration: none;
        opacity: 0.9;
    }

    /* 📱 MOBILE VIEW (completely different feel) */
    @media(max-width: 768px) {
        .container-box {
            margin: 0;
            border-radius: 0;
            min-height: 100vh;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .desktop-grid {
            display: block !important;
        }

        .upload-box {
            padding: 18px;
            font-size: 14px;
        }

        .submit-btn {
            width: 100%;
        }
    }
</style>
</head>

<body>

<div class="container">
    <div class="container-box">

        <h2>Raise a Complaint</h2>

        <form>

            <!-- Row 1 -->
            <div class="row g-3">
                <div class="col-md-4">
                    <select class="form-select">
                        <option selected disabled>Select Order ID</option>
                        <option>ORD123</option>
                        <option>ORD456</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <input type="text" class="form-control" placeholder="Your Name">
                </div>

                <div class="col-md-4">
                    <input type="email" class="form-control" placeholder="Email">
                </div>
            </div>

            <!-- Row 2 -->
            <div class="row g-3 mt-2">
                <div class="col-md-4">
                    <input type="text" class="form-control" placeholder="Phone">
                </div>

                <div class="col-md-4">
                    <input type="text" class="form-control" placeholder="Part Name / Number">
                </div>

                <div class="col-md-6">
                    <select class="form-select" id="Issue">
                        <option selected disabled>Select Issue Type</option>
                        <option>Product Issue</option>
                        <option>Vendor Issue</option>
                        <option>Order Issue</option>
                        <option>Platform Issue</option>
                    </select>
                </div>
            </div>

            <!-- Row 3 -->
            <div class="row g-3 mt-2">
                <div class="col-md-6">
                    <select class="form-select" id="make">
                        <option selected disabled>Select Make</option>
                        <option>Honda</option>
                        <option>Yamaha</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <select class="form-select" id="model">
                        <option selected disabled>Select Model</option>
                    </select>
                </div>
            </div>

            <!-- Description -->
            <div class="mt-3">
                <textarea class="form-control" rows="4" placeholder="Describe your issue"></textarea>
            </div>

            <!-- Image Upload -->
            <div class="mt-4">
                <label class="mb-2">Product Photo showing problem</label>
                <input type="file" class="form-control">
            </div>

            <!-- Video Upload -->
            <div class="mt-4">
                <label class="mb-2">Unboxing Video of the Product</label>
                <div class="upload-box" onclick="document.getElementById('videoUpload').click()">
                    Click to upload video (MP4, WebM)
                </div>
                <input type="file" id="videoUpload" hidden>
            </div>

            <!-- Submit -->
            <div class="mt-4">
               <a href="complaint_submitted.html" class="submit-btn">
                Submit Complaint
            </a>
            </div>
        </form>

    </div>
</div>

<!-- JS -->
<script>
    // Dynamic Model Dropdown
    const models = {
        Honda: ["Activa", "Shine", "CBR"],
        Yamaha: ["R15", "FZ", "MT15"]
    };

    document.getElementById("make").addEventListener("change", function() {
        let modelSelect = document.getElementById("model");
        modelSelect.innerHTML = "<option selected disabled>Select Model</option>";

        models[this.value].forEach(m => {
            let option = document.createElement("option");
            option.text = m;
            modelSelect.add(option);
        });
    });
</script>

</body>
</html>
